name: 'CI/CD'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_js:
      name: Lint JavaScript Files
      runs-on: ubuntu-latest
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Add this line
        
      steps:
      - name: Checkout Repository
        uses: actions/checkout@v5  # Updated from v3 to v4

      - name: Install Node.js
        uses: actions/setup-node@v5  # Updated from v3 to v4
        with:
          node-version: 24  # Consider updating from 14 to 18 or 20 (Node.js 14 is EOL)

      - name: Install JSHint
        run: npm install jshint --global

      - name: Run Linter
        run: |
          find ./giftlink-backend -name app.js -exec jshint {} +
          find ./giftlink-backend/routes -name authRoutes.js -exec jshint {} +
          find ./giftlink-backend/routes -name giftRoutes.js -exec jshint {} +
          find ./giftlink-backend/routes -name searchRoutes.js -exec jshint {} +
          echo "Linted all the js files successfully"

  client_build:
      name: Build client
      runs-on: ubuntu-latest
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Add this line
        
      steps:
      - name: Checkout Repository
        uses: actions/checkout@v5  # Updated from v3 to v4

      - name: Install Node.js
        uses: actions/setup-node@v5  # Updated from v3 to v4
        with:
          node-version: 24  # Consider updating from 14 to 18 or 20

      - name: Run build
        run: |
          cd giftlink-frontend
          npm install
          npm run build
          echo "Client-side build successfully"
