<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiftLink Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/home.css">
</head>
<body>
    <div class="container my-5">
        <div class="text-center">
            <!-- Task 1: Add the main heading -->
            <h1 class="display-4 font-weight-bold text-primary mb-3">GiftLink</h1>
            
            <!-- Task 2: Add the subheading -->
            <p class="lead text-muted mb-4">Share a Gift, Spread Joy. Connect with neighbors to give and receive items.</p>
            
            <!-- Task 3: Add the inspirational quote -->
            <blockquote class="blockquote my-4">
                <p class="mb-0 font-italic">"Giving is not just about making a donation. It is about making a difference."</p>
            </blockquote>
            
            <!-- Task 4: Add the 'Get Started' button -->
            <a href="/app" class="btn btn-primary btn-lg mt-3 px-5 py-3 font-weight-bold" style="border-radius: 30px;">Get Started</a>
        </div>
    </div>
</body>
</html>
